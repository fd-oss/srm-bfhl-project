<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BFHL — Node Hierarchy Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .glow-blob.one { width: 400px; height: 400px; background: rgba(108,99,255,0.12); top: -100px; left: -100px; }
  .glow-blob.two { width: 350px; height: 350px; background: rgba(255,101,132,0.08); bottom: -80px; right: -80px; }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 48px;
  }
  .logo-badge {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    box-shadow: 0 0 24px rgba(108,99,255,0.4);
  }
  h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }
  .subtitle { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Input Section */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 32px;
    transition: border-color 0.3s;
  }
  .input-card:focus-within { border-color: var(--accent); }

  .input-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: block;
  }

  .input-row { display: flex; gap: 12px; align-items: flex-start; }

  textarea {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 14px 16px;
    resize: vertical;
    min-height: 110px;
    outline: none;
    line-height: 1.7;
    transition: border-color 0.2s;
  }
  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: var(--accent); }

  .btn {
    padding: 14px 24px;
    border: none;
    border-radius: 12px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9b59ff);
    color: white;
    box-shadow: 0 4px 20px rgba(108,99,255,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(108,99,255,0.5); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .hints {
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .hint-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
  }
  .hint-valid { border-color: rgba(67,233,123,0.3); color: var(--accent3); }
  .hint-invalid { border-color: rgba(255,101,132,0.3); color: var(--accent2); }

  /* Error */
  .error-box {
    background: rgba(255,101,132,0.08);
    border: 1px solid rgba(255,101,132,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--accent2);
    font-family: var(--mono);
    font-size: 13px;
    margin-bottom: 24px;
    display: none;
  }
  .error-box.show { display: block; }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }
  .loading.show { display: block; }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  #results { display: none; }
  #results.show { display: block; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* Identity strip */
  .identity-strip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }
  .id-item { }
  .id-key { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
  .id-val { font-family: var(--mono); font-size: 13px; color: var(--accent); }

  /* Summary Cards */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    text-align: center;
    transition: border-color 0.2s, transform 0.2s;
  }
  .summary-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .summary-num {
    font-size: 36px;
    font-weight: 800;
    font-family: var(--mono);
    line-height: 1;
    margin-bottom: 6px;
  }
  .summary-num.trees { color: var(--accent3); }
  .summary-num.cycles { color: var(--accent2); }
  .summary-num.root { color: var(--accent); font-size: 28px; }
  .summary-desc { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }

  /* Hierarchies */
  .hierarchies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .hierarchy-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    transition: border-color 0.2s;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
    transform: translateY(12px);
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .hierarchy-card.cycle { border-color: rgba(255,101,132,0.3); }
  .hierarchy-card.cycle:hover { border-color: var(--accent2); }
  .hierarchy-card:not(.cycle):hover { border-color: var(--accent); }

  .hcard-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .hcard-root {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }
  .hcard-root.cycle-root { color: var(--accent2); }
  .badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .badge-tree { background: rgba(67,233,123,0.12); color: var(--accent3); border: 1px solid rgba(67,233,123,0.25); }
  .badge-cycle { background: rgba(255,101,132,0.12); color: var(--accent2); border: 1px solid rgba(255,101,132,0.25); }

  .depth-row {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .depth-row span { color: var(--text); }

  /* Tree viz */
  .tree-viz {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.9;
    color: var(--text);
    overflow-x: auto;
    white-space: pre;
  }
  .tree-viz .node { color: var(--accent); }
  .tree-viz .branch { color: var(--muted); }

  /* Invalid / Duplicates */
  .tags-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .tags-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .tags-title.inv { color: var(--accent2); }
  .tags-title.dup { color: #f0a500; }
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag {
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 8px;
  }
  .tag-inv { background: rgba(255,101,132,0.1); color: var(--accent2); border: 1px solid rgba(255,101,132,0.2); }
  .tag-dup { background: rgba(240,165,0,0.1); color: #f0a500; border: 1px solid rgba(240,165,0,0.25); }
  .empty-tag { color: var(--muted); font-family: var(--mono); font-size: 12px; }

  /* Raw JSON */
  details {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  summary {
    padding: 16px 24px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    user-select: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.2s;
  }
  summary:hover { color: var(--text); }
  pre.raw {
    background: var(--card);
    margin: 0 16px 16px;
    border-radius: 10px;
    padding: 16px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.7;
    overflow-x: auto;
    color: var(--text);
  }

  /* URL config */
  .api-config {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .api-config label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap; }
  .api-config input {
    flex: 1;
    min-width: 200px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-config input:focus { border-color: var(--accent); }

  @media (max-width: 600px) {
    .summary-row { grid-template-columns: 1fr 1fr; }
    .summary-row .summary-card:last-child { grid-column: span 2; }
    .input-row { flex-direction: column; }
    .btn { width: 100%; text-align: center; }
    header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="glow-blob one"></div>
<div class="glow-blob two"></div>
<div class="wrapper">

  <header>
    <div class="logo-badge">BF<br>HL</div>
    <div>
      <h1>Node <span>Hierarchy</span> Analyzer</h1>
      <div class="subtitle">SRM Full Stack Engineering Challenge · Round 1</div>
    </div>
  </header>

  <!-- API URL Config -->
  <div class="api-config">
    <label>API URL</label>
    <input type="text" id="apiUrl" value="http://localhost:3000" placeholder="https://your-backend.render.com"/>
  </div>

  <!-- Input -->
  <div class="input-card">
    <label class="input-label">Enter Node Edges</label>
    <div class="input-row">
      <textarea id="inputData" placeholder='A->B, A->C, B->D, X->Y, Y->Z, Z->X, hello, 1->2, G->H, G->H, G->I'></textarea>
      <button class="btn btn-primary" id="submitBtn" onclick="submitData()">Analyze →</button>
    </div>
    <div class="hints">
      <span>Separate by comma or newline</span>
      <span class="hint-badge hint-valid">✓ A->B</span>
      <span class="hint-badge hint-invalid">✗ hello</span>
      <span class="hint-badge hint-invalid">✗ 1->2</span>
      <span class="hint-badge hint-invalid">✗ AB->C</span>
    </div>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    Processing hierarchies...
  </div>

  <!-- Results -->
  <div id="results">
    <div class="identity-strip" id="identityStrip"></div>

    <div class="section-label">Summary</div>
    <div class="summary-row" id="summaryRow"></div>

    <div class="section-label">Hierarchies</div>
    <div class="hierarchies-grid" id="hierarchiesGrid"></div>

    <div id="tagsSection"></div>

    <details>
      <summary>⬡ Raw JSON Response</summary>
      <pre class="raw" id="rawJson"></pre>
    </details>
  </div>
</div>

<script>
// ── Tree Rendering ───────────────────────────────────────────────────────────
function renderTree(treeObj, prefix = '', isRoot = true) {
  if (!treeObj || Object.keys(treeObj).length === 0) return '';
  let out = '';
  const entries = Object.entries(treeObj);
  entries.forEach(([node, children], i) => {
    const isLast = i === entries.length - 1;
    if (isRoot) {
      out += `<span class="node">${node}</span>\n`;
      out += renderTree(children, '', false);
    } else {
      const connector = isLast ? '└── ' : '├── ';
      const childPrefix = prefix + (isLast ? '    ' : '│   ');
      out += `<span class="branch">${prefix}${connector}</span><span class="node">${node}</span>\n`;
      out += renderTree(children, childPrefix, false);
    }
  });
  return out;
}

// ── Submit ───────────────────────────────────────────────────────────────────
async function submitData() {
  const raw = document.getElementById('inputData').value.trim();
  const baseUrl = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
  const btn = document.getElementById('submitBtn');
  const errorBox = document.getElementById('errorBox');
  const loading = document.getElementById('loading');
  const results = document.getElementById('results');

  errorBox.classList.remove('show');
  results.classList.remove('show');
  loading.classList.add('show');
  btn.disabled = true;

  // Parse input (comma or newline separated)
  const data = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

  try {
    const res = await fetch(`${baseUrl}/bfhl`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data })
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`HTTP ${res.status}: ${err}`);
    }

    const json = await res.json();
    renderResults(json);
  } catch (err) {
    errorBox.textContent = `❌ API Error: ${err.message}`;
    errorBox.classList.add('show');
  } finally {
    loading.classList.remove('show');
    btn.disabled = false;
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderResults(d) {
  // Identity
  document.getElementById('identityStrip').innerHTML = `
    <div class="id-item"><div class="id-key">User ID</div><div class="id-val">${d.user_id}</div></div>
    <div class="id-item"><div class="id-key">Email</div><div class="id-val">${d.email_id}</div></div>
    <div class="id-item"><div class="id-key">Roll Number</div><div class="id-val">${d.college_roll_number}</div></div>
  `;

  // Summary
  document.getElementById('summaryRow').innerHTML = `
    <div class="summary-card">
      <div class="summary-num trees">${d.summary.total_trees}</div>
      <div class="summary-desc">Valid Trees</div>
    </div>
    <div class="summary-card">
      <div class="summary-num cycles">${d.summary.total_cycles}</div>
      <div class="summary-desc">Cyclic Groups</div>
    </div>
    <div class="summary-card">
      <div class="summary-num root">${d.summary.largest_tree_root || '—'}</div>
      <div class="summary-desc">Largest Tree Root</div>
    </div>
  `;

  // Hierarchies
  const grid = document.getElementById('hierarchiesGrid');
  grid.innerHTML = '';
  d.hierarchies.forEach((h, i) => {
    const card = document.createElement('div');
    card.className = `hierarchy-card${h.has_cycle ? ' cycle' : ''}`;
    card.style.animationDelay = `${i * 0.07}s`;

    const treeContent = h.has_cycle
      ? `<div class="tree-viz" style="color:var(--accent2);text-align:center;padding:20px;">⟳ Cycle Detected<br><small style="color:var(--muted)">No tree structure</small></div>`
      : `<div class="tree-viz">${renderTree(h.tree)}</div>`;

    card.innerHTML = `
      <div class="hcard-header">
        <div class="hcard-root${h.has_cycle ? ' cycle-root' : ''}">${h.root}</div>
        <span class="badge ${h.has_cycle ? 'badge-cycle' : 'badge-tree'}">${h.has_cycle ? 'Cycle' : 'Tree'}</span>
      </div>
      ${!h.has_cycle ? `<div class="depth-row">Depth: <span>${h.depth}</span></div>` : ''}
      ${treeContent}
    `;
    grid.appendChild(card);
  });

  // Invalid & Duplicate tags
  const tagsSection = document.getElementById('tagsSection');
  tagsSection.innerHTML = `
    <div class="tags-row">
      <div class="tags-title inv">Invalid Entries</div>
      <div class="tags-wrap">
        ${d.invalid_entries.length
          ? d.invalid_entries.map(e => `<span class="tag tag-inv">${e}</span>`).join('')
          : '<span class="empty-tag">none</span>'}
      </div>
    </div>
    <div class="tags-row" style="margin-bottom:24px;">
      <div class="tags-title dup">Duplicate Edges</div>
      <div class="tags-wrap">
        ${d.duplicate_edges.length
          ? d.duplicate_edges.map(e => `<span class="tag tag-dup">${e}</span>`).join('')
          : '<span class="empty-tag">none</span>'}
      </div>
    </div>
  `;

  // Raw JSON
  document.getElementById('rawJson').textContent = JSON.stringify(d, null, 2);

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') submitData();
});
</script>
</body>
</html>
